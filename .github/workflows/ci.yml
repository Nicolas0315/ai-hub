name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  deep-grammar-regression:
    name: Deep Grammar Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run KQ deep grammar regression
        run: python3 inf-Coding/inf-Coding-Assist/kq_deep_grammar_regression.py

  logic-math-benchmark:
    name: Logic/Math Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run KQ logic-math benchmark
        run: python3 inf-Coding/inf-Coding-Assist/kq_logic_math_benchmark.py

  iut-subset-check:
    name: IUT Subset Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run IUT core subset scaffold
        run: python3 inf-Coding/inf-Coding-Assist/iut_subset_scaffold.py

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, deep-grammar-regression, logic-math-benchmark, iut-subset-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          # Required for Next.js build — use dummy values in CI
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-32chars-placeholder' }}
          NEXTAUTH_URL: http://localhost:3000
