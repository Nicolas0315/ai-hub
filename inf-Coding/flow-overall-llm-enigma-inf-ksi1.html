<rect class="box" x="670" y="1430" width="560" height="90"/><text class="txt" x="950" y="1462">Result Normalize</text><text class="txt small" x="950" y="1488">verdict / confidence / final_score</text>

<rect class="box" x="670" y="1690" width="560" height="90"/><text class="txt" x="950" y="1722">emit_router_event / emit_bridge_output</text><text class="txt small" x="950" y="1748">inf_coding_adapter.py</text>
