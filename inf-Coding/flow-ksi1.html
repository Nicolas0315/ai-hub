<!doctype html>
<html><head><meta charset="utf-8"><title>KSi1 Flow</title>
<style>

.box{fill:#fff;stroke:#222;stroke-width:2;rx:12;ry:12}
.decision{fill:#fff;stroke:#222;stroke-width:2}
.block{fill:#ffecec;stroke:#b33;stroke-width:2;rx:12;ry:12}
.txt{font-size:16px;fill:#111;text-anchor:middle;dominant-baseline:middle}
