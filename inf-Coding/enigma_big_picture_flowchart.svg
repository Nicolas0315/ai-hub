<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <style>
      .title{font:700 36px 'Noto Sans JP','Yu Gothic','Meiryo',sans-serif;fill:#0f172a}
      .sub{font:500 16px 'Noto Sans JP','Yu Gothic','Meiryo',sans-serif;fill:#475569}
      .h{font:700 24px 'Noto Sans JP','Yu Gothic','Meiryo',sans-serif;fill:#0f172a}
      .t{font:500 16px 'Noto Sans JP','Yu Gothic','Meiryo',sans-serif;fill:#334155}
      .small{font:500 14px 'Noto Sans JP','Yu Gothic','Meiryo',sans-serif;fill:#475569}
      .edge{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
      .feedback{fill:none;stroke:#7c3aed;stroke-width:3;marker-end:url(#arrow2)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <text x="56" y="68" class="title">Enigma 全体フローチャート（Big Picture）</text>
  <text x="56" y="98" class="sub">Enigma → LLM → OpenClaw → Katala の大枠構成</text>

  <!-- Top line -->
  <g filter="url(#shadow)">
    <rect x="90" y="210" width="300" height="180" rx="18" ry="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="122" y="262" class="h">1. Enigma</text>
    <text x="122" y="292" class="t">ユーザーの意図整理</text>
    <text x="122" y="318" class="t">要求定義・優先順位づけ</text>
    <text x="122" y="344" class="t">実行方針の決定</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="210" width="300" height="180" rx="18" ry="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
    <text x="502" y="262" class="h">2. LLM</text>
    <text x="502" y="292" class="t">推論・生成・計画</text>
    <text x="502" y="318" class="t">コード/文書の下書き作成</text>
    <text x="502" y="344" class="t">判断候補の提示</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="210" width="300" height="180" rx="18" ry="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="882" y="262" class="h">3. OpenClaw</text>
    <text x="882" y="292" class="t">ツール実行オーケストレーション</text>
    <text x="882" y="318" class="t">Discord/WSL/Browser連携</text>
    <text x="882" y="344" class="t">セッション管理・安全制御</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="210" width="300" height="180" rx="18" ry="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="1262" y="262" class="h">4. Katala</text>
    <text x="1262" y="292" class="t">実装・データ処理・検証</text>
    <text x="1262" y="318" class="t">成果物生成（図/コード/分析）</text>
    <text x="1262" y="344" class="t">結果を運用に反映</text>
  </g>

  <!-- arrows forward -->
  <path d="M390 300 L470 300" class="edge"/>
  <path d="M770 300 L850 300" class="edge"/>
  <path d="M1150 300 L1230 300" class="edge"/>

  <!-- lower section -->
  <g filter="url(#shadow)">
    <rect x="120" y="530" width="1360" height="260" rx="16" ry="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <text x="156" y="582" class="h">処理サイクル（運用時）</text>
  <text x="156" y="616" class="t">① Enigmaが目的を定義 → ② LLMが実行計画を作成 → ③ OpenClawがツールを実行 → ④ Katalaで成果を確定</text>
  <text x="156" y="646" class="t">⑤ 結果をOpenClaw経由で返却 → ⑥ Enigmaが次の意思決定へ反映（継続改善ループ）</text>

  <!-- feedback loop -->
  <path d="M1380 390 L1380 470 L240 470 L240 390" class="feedback"/>
  <text x="680" y="456" class="small">Feedback / Learning Loop（Katalaの成果が次のEnigma判断を強化）</text>

  <!-- legend -->
  <rect x="90" y="840" width="1440" height="80" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="122" y="888" class="small">この図は大枠（抽象レイヤ）です。必要なら次に「実際のツール名（message / exec / sessions_spawn等）」入りの詳細版を作れます。</text>
</svg>
